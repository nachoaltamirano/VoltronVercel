<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Voltron Lab | Panel de Administración</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/styles.css">
    <link rel="stylesheet" href="css/admin.css">
</head>
<body class="admin-body">
    <!-- Pantalla de login -->
    <div id="loginScreen" class="login-screen">
        <div class="login-card">
            <div class="login-header">
                <img src="assets/logo-voltron-lab.png" alt="Voltron Lab" class="logo-img">
                <h2>Panel de Administración</h2>
            </div>
            <form id="loginForm" class="login-form">
                <div class="form-group">
                    <label for="adminEmail">Email</label>
                    <input type="email" id="adminEmail" required placeholder="admin@voltronlab.com">
                </div>
                <div class="form-group">
                    <label for="adminPassword">Contraseña</label>
                    <input type="password" id="adminPassword" required placeholder="••••••••">
                </div>
                <p id="loginError" class="error-message hidden"></p>
                <button type="submit" class="btn btn-primary btn-full">Iniciar sesión</button>
            </form>
        </div>
    </div>

    <!-- Panel principal (oculto hasta login) -->
    <div id="adminPanel" class="admin-panel hidden">
        <header class="admin-header">
            <div class="admin-header-content">
                <a href="index.html" class="logo">
                    <img src="assets/logo-voltron-lab.png" alt="Voltron Lab" class="logo-img">
                </a>
                <div class="admin-actions">
                    <span class="admin-user" id="adminUserEmail"></span>
                    <button id="logoutBtn" class="btn btn-secondary btn-sm">Cerrar sesión</button>
                </div>
            </div>
        </header>

        <main class="admin-main">
            <div class="container">
                <h1 class="admin-title">Gestión de Turnos</h1>

                <!-- Formulario para crear turnos -->
                <section class="admin-section">
                    <h2>Crear nuevo turno</h2>
                    <form id="createSlotForm" class="create-slot-form">
                        <div class="form-group">
                            <label>Tipo de turno</label>
                            <div class="radio-group">
                                <label class="radio-label">
                                    <input type="radio" name="slotType" value="single" checked>
                                    Turno único
                                </label>
                                <label class="radio-label">
                                    <input type="radio" name="slotType" value="recurring">
                                    Múltiples días (recurrente)
                                </label>
                            </div>
                        </div>

                        <!-- Turno único -->
                        <div id="singleSlotFields" class="slot-fields">
                            <div class="form-row">
                                <div class="form-group">
                                    <label for="newSlotDate">Fecha</label>
                                    <input type="date" id="newSlotDate" required>
                                </div>
                                <div class="form-group">
                                    <label for="newSlotTime">Hora</label>
                                    <input type="time" id="newSlotTime" required>
                                </div>
                            </div>
                        </div>

                        <!-- Turno recurrente -->
                        <div id="recurringSlotFields" class="slot-fields hidden">
                            <div class="form-row">
                                <div class="form-group">
                                    <label>Días de la semana</label>
                                    <div class="checkbox-group">
                                        <label class="checkbox-label">
                                            <input type="checkbox" name="recurringDays" value="0"> Lunes
                                        </label>
                                        <label class="checkbox-label">
                                            <input type="checkbox" name="recurringDays" value="1"> Martes
                                        </label>
                                        <label class="checkbox-label">
                                            <input type="checkbox" name="recurringDays" value="2"> Miércoles
                                        </label>
                                        <label class="checkbox-label">
                                            <input type="checkbox" name="recurringDays" value="3"> Jueves
                                        </label>
                                        <label class="checkbox-label">
                                            <input type="checkbox" name="recurringDays" value="4"> Viernes
                                        </label>
                                        <label class="checkbox-label">
                                            <input type="checkbox" name="recurringDays" value="5"> Sábado
                                        </label>
                                        <label class="checkbox-label">
                                            <input type="checkbox" name="recurringDays" value="6"> Domingo
                                        </label>
                                    </div>
                                </div>
                            </div>
                            <div class="form-row">
                                <div class="form-group">
                                    <label for="recurringTime">Hora</label>
                                    <input type="time" id="recurringTime" required>
                                </div>
                                <div class="form-group">
                                    <label for="recurringDaysRange">Cantidad de semanas</label>
                                    <input type="number" id="recurringDaysRange" min="1" max="52" value="4" required>
                                </div>
                            </div>
                        </div>

                        <div class="form-row">
                            <button type="submit" class="btn btn-primary">Agregar turno(s)</button>
                        </div>
                    </form>

                    <!-- Lista de bloqueos recurrentes -->
                    <div id="blockPatternsList" style="margin-top: 20px;"></div>
                </section>

                <!-- Vista principal con solapas -->
                <section class="admin-section">
                    <div class="tabs-main">
                        <button class="tab-main active" data-tab="calendar">📅 Calendario</button>
                        <button class="tab-main" data-tab="available">📋 Turnos Disponibles</button>
                    </div>

                    <!-- Solapa Calendario -->
                    <div id="calendarTab" class="tab-content active">
                        <div id="calendarContainer">
                            <div id="calendarView" class="calendar-view"></div>
                        </div>
                    </div>

                    <!-- Solapa Turnos Disponibles -->
                    <div id="availableTab" class="tab-content">
                        <div id="availableSlotsList" class="slots-list"></div>
                    </div>
                </section>
            </div>
        </main>

        <!-- Modal para reagendar -->
        <div id="rescheduleModal" class="modal hidden">
            <div class="modal-content">
                <div class="modal-header">
                    <h2>Reagendar turno</h2>
                    <button class="modal-close" id="modalClose">&times;</button>
                </div>
                <form id="rescheduleForm">
                    <input type="hidden" id="rescheduleAppointmentId">
                    <div class="form-group">
                        <label for="rescheduleDate">Nueva fecha</label>
                        <input type="date" id="rescheduleDate" required>
                    </div>
                    <div class="form-group">
                        <label for="rescheduleTime">Nueva hora</label>
                        <input type="time" id="rescheduleTime" required>
                    </div>
                    <div class="form-row">
                        <button type="submit" class="btn btn-primary">Reagendar</button>
                        <button type="button" class="btn btn-secondary" id="modalCancel">Cancelar</button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <!-- Toast -->
    <div id="adminToast" class="toast hidden">
        <div class="toast-content">
            <span class="toast-icon">✓</span>
            <p id="adminToastMessage"></p>
        </div>
    </div>

    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="js/config.js"></script>
    <script src="js/firebase-service.js"></script>
    <script src="js/google-calendar-service.js"></script>
    <script src="js/admin.js"></script>
</body>
</html>
</body>
</html>
